name: macOS Build

on:
  push:
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Show runner details
        run: |
          uname -a
          uname -m
          xcodebuild -version

      - name: Require Apple Silicon runner
        run: test "$(uname -m)" = arm64

      - name: Validate localized strings
        run: |
          set -euo pipefail
          for file in zh_CN.lproj/*.strings; do
            echo "Checking $file"
            plutil -lint "$file"
          done

      - name: Build binary dependencies if needed
        run: make BUILD_DIR="$RUNNER_TEMP/iterm-build" DepsIfNeeded

      - name: Sync tracked Xcode version marker
        run: xcodebuild -version > last-xcode-version

      - name: Kill stale Xcode agents
        run: |
          killall ibtoold 2>/dev/null || true
          killall AssetCatalogSimulatorAgent 2>/dev/null || true
          killall AssetCatalogAgent 2>/dev/null || true

      - name: Build iTerm2
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Build attempt $attempt of 5"
            set +e
            BUILD_DIR="$RUNNER_TEMP/iterm-build" tools/build.sh Development
            exit_code=$?
            set -e
            echo "::endgroup::"

            if [ $exit_code -eq 0 ]; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi

            if grep -q "IBPlatformToolFailureException\|The tool closed the connection\|CompileAssetCatalogVariant failed" tmp/build.log; then
              echo "::warning::Attempt $attempt failed due to flaky ibtoold/actool crash (known Xcode bug)"
              if [ $attempt -lt 5 ]; then
                echo "Retrying after cleaning DerivedData..."
                killall ibtoold 2>/dev/null || true
                killall AssetCatalogSimulatorAgent 2>/dev/null || true
                killall AssetCatalogAgent 2>/dev/null || true
                rm -rf ~/Library/Developer/Xcode/DerivedData
                sleep 10
                continue
              fi
            fi

            echo "::error::Build failed on attempt $attempt"
            exit $exit_code
          done

      - name: Package as DMG
        run: |
          APP_PATH="$RUNNER_TEMP/iterm-build/Development/iTerm2.app"
          DMG_DIR="$RUNNER_TEMP/dmg-staging"
          DMG_PATH="$RUNNER_TEMP/iTerm2-Development.dmg"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "iTerm2" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iTerm2-Development.dmg
          path: ${{ runner.temp }}/iTerm2-Development.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: tmp/build.log
          if-no-files-found: ignore
          retention-days: 7
