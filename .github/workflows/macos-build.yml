name: macOS Build

on:
  push:
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Show runner details
        run: |
          uname -a
          uname -m
          xcodebuild -version

      - name: Require Apple Silicon runner
        run: test "$(uname -m)" = arm64

      - name: Validate localized strings
        run: |
          set -euo pipefail
          for file in zh_CN.lproj/*.strings; do
            echo "Checking $file"
            plutil -lint "$file"
          done

      - name: Build binary dependencies if needed
        run: make BUILD_DIR="$RUNNER_TEMP/iterm-build" DepsIfNeeded

      - name: Sync tracked Xcode version marker
        run: xcodebuild -version > last-xcode-version

      - name: Kill stale Xcode agents
        run: |
          killall ibtoold 2>/dev/null || true
          killall AssetCatalogSimulatorAgent 2>/dev/null || true
          killall AssetCatalogAgent 2>/dev/null || true

      - name: Work around actool .icon crash
        run: |
          # Xcode 26's actool crashes when processing .icon files on CI runners.
          # Remove the files and strip their references from the project so
          # xcodebuild won't attempt to compile them.
          rm -rf images/AppIcon/*.icon
          sed -i '' '/\.icon/d' iTerm2.xcodeproj/project.pbxproj

      - name: Build iTerm2
        run: BUILD_DIR="$RUNNER_TEMP/iterm-build" tools/build.sh Development

      - name: Inject app icon
        run: |
          APP_PATH="$RUNNER_TEMP/iterm-build/Development/iTerm2.app"
          ICONSET="$RUNNER_TEMP/AppIcon.iconset"
          mkdir -p "$ICONSET"
          # Generate all required icon sizes from the 512x512 source
          sips -z 16 16     images/AppIcon.png --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     images/AppIcon.png --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     images/AppIcon.png --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     images/AppIcon.png --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   images/AppIcon.png --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   images/AppIcon.png --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   images/AppIcon.png --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   images/AppIcon.png --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512   images/AppIcon.png --out "$ICONSET/icon_512x512.png"
          cp              images/AppIcon.png    "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o "$APP_PATH/Contents/Resources/AppIcon.icns"
          # Update Info.plist to reference the icns file
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" \
            "$APP_PATH/Contents/Info.plist"

      - name: Inject Chinese localization
        run: |
          APP_PATH="$RUNNER_TEMP/iterm-build/Development/iTerm2.app"
          # Install both zh_CN and zh-Hans variants so macOS finds them
          # regardless of which locale identifier it resolves to
          for lang in zh_CN zh-Hans; do
            LPROJ="$APP_PATH/Contents/Resources/${lang}.lproj"
            mkdir -p "$LPROJ"
            cp zh_CN.lproj/*.strings "$LPROJ/"
          done
          # Declare supported localizations in Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations array" \
            "$APP_PATH/Contents/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:0 string en" \
            "$APP_PATH/Contents/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:1 string zh_CN" \
            "$APP_PATH/Contents/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:2 string zh-Hans" \
            "$APP_PATH/Contents/Info.plist" 2>/dev/null || true

      - name: Package as DMG
        run: |
          APP_PATH="$RUNNER_TEMP/iterm-build/Development/iTerm2.app"
          DMG_DIR="$RUNNER_TEMP/dmg-staging"
          DMG_PATH="$RUNNER_TEMP/iTerm2-Development.dmg"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "iTerm2" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iTerm2-Development.dmg
          path: ${{ runner.temp }}/iTerm2-Development.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: tmp/build.log
          if-no-files-found: ignore
          retention-days: 7
